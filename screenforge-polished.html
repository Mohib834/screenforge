<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenforge Pro Layout</title>
    <style>
      :root {
        --bg-dark: #0f0f11;
        --panel-bg: #18181b;
        --border: #27272a;
        --accent: #f43f5e; /* Red-ish from your screenshot */
        --text: #e4e4e7;
        --text-muted: #71717a;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: var(--bg-dark);
        color: var(--text);
        font-family: 'Inter', system-ui, sans-serif;
        overflow: hidden;
      }

      /* 1. MAIN GRID LAYOUT */
      .app-shell {
        display: grid;
        grid-template-areas:
          'header header header'
          'tools viewport inspector'
          'tools timeline inspector';
        grid-template-columns: 64px 1fr 280px;
        grid-template-rows: 56px 1fr 300px;
        height: 100vh;
      }

      /* 2. HEADER (Full Width) */
      header {
        grid-area: header;
        background: var(--panel-bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
      }

      /* 3. TOOLS (Slim Sidebar) */
      .toolbelt {
        grid-area: tools;
        background: var(--panel-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding-top: 20px;
      }

      .tool-icon {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
        color: var(--text-muted);
      }
      .tool-icon:hover {
        background: var(--border);
        color: white;
      }
      .tool-icon.active {
        color: var(--accent);
        background: #f43f5e15;
      }

      /* 4. VIEWPORT (Main Stage) */
      .viewport-container {
        grid-area: viewport;
        position: relative;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .canvas-controls {
        position: absolute;
        bottom: 12px;
        background: rgba(24, 24, 27, 0.8);
        backdrop-filter: blur(8px);
        padding: 4px 12px;
        border-radius: 20px;
        display: flex;
        gap: 15px;
        font-size: 12px;
        border: 1px solid var(--border);
      }

      /* 5. INSPECTOR (Right Sidebar) */
      .inspector {
        grid-area: inspector;
        background: var(--panel-bg);
        border-left: 1px solid var(--border);
        padding: 16px;
        overflow-y: auto;
      }

      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 12px;
        letter-spacing: 0.05em;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 13px;
      }

      /* 6. TIMELINE */
      .timeline {
        grid-area: timeline;
        background: var(--bg-dark);
        border-top: 1px solid var(--border);
        padding: 10px;
      }

      /* Button Styling */
      .btn-record {
        background: var(--accent);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header>
        <div style="font-weight: bold; display: flex; align-items: center; gap: 8px">
          <div
            style="width: 12px; height: 12px; background: var(--accent); border-radius: 50%"
          ></div>
          Screenforge
        </div>
        <nav style="display: flex; gap: 24px; font-size: 14px; color: var(--text-muted)">
          <span style="color: white; cursor: pointer">Record</span>
          <span style="cursor: pointer">Library</span>
          <span style="cursor: pointer">Settings</span>
        </nav>
        <div style="display: flex; gap: 12px">
          <button
            style="
              background: transparent;
              color: white;
              border: 1px solid var(--border);
              padding: 8px 16px;
              border-radius: 6px;
            "
          >
            Save
          </button>
          <button class="btn-record">● New Recording</button>
        </div>
      </header>

      <aside class="toolbelt">
        <div class="tool-icon active" title="Select Tool">⬈</div>
        <div class="tool-icon" title="Zoom Control">🔍</div>
        <div class="tool-icon" title="Add Text">T</div>
        <div class="tool-icon" title="Cursor Effects">Cursor</div>
        <div style="margin-top: auto; margin-bottom: 20px" class="tool-icon">📁</div>
      </aside>

      <main class="viewport-container">
        <div style="color: #333; text-align: center">
          <div style="font-size: 48px">🖥️</div>
          <p>Ready to record</p>
        </div>

        <div class="canvas-controls">
          <span>Fit to Screen</span>
          <span>1920 × 1080</span>
          <span style="color: var(--accent)">Snap: ON</span>
        </div>
      </main>

      <aside class="inspector">
        <div class="section-title">Project Details</div>
        <div class="stat-row"><span>Duration</span> <span style="color: #4ade80">0:00</span></div>
        <div class="stat-row"><span>FPS</span> <span>60</span></div>
        <div class="stat-row"><span>Size</span> <span>--</span></div>

        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0" />

        <div class="section-title">Node Config</div>
        <p style="font-size: 12px; color: var(--text-muted)">
          Select a layer or node on the timeline to edit properties.
        </p>
      </aside>

      <section class="timeline">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
          "
        >
          <div style="display: flex; gap: 10px">
            ⏯ ⏹ <span style="color: var(--accent); margin-left: 10px">00:00 / 01:00</span>
          </div>
          <button
            style="
              background: var(--border);
              border: none;
              color: white;
              padding: 4px 10px;
              border-radius: 4px;
              font-size: 11px;
            "
          >
            + ADD LAYER
          </button>
        </div>
        <div
          style="
            height: 150px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border: 1px dashed var(--border);
          "
        ></div>
      </section>
    </div>
  </body>
</html>
